<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}" />
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2LMDQ6TL49"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2LMDQ6TL49');
  </script>
</head>
<body>

  <nav>
    <a class="nav-logo" href="{{ '/' | relative_url }}">The Singletracks</a>
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/blog' | relative_url }}">Storie</a></li>
      <li><a href="{{ '/gear' | relative_url }}">Gear</a></li>
      <li><a href="https://instagram.com/thesingletracks" target="_blank">Instagram</a></li>
      <li><a href="https://www.facebook.com/thesingletracks" target="_blank">Facebook</a></li>
      <li><a href="https://www.youtube.com/@thesingletracks" target="_blank">YouTube</a></li>
      <li><a href="{{ '/contatti' | relative_url }}">Contatti</a></li>
    </ul>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <span class="footer-logo">The Singletracks</span>
    <div class="footer-links">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/blog' | relative_url }}">Blog</a>
      <a href="{{ '/gear' | relative_url }}">Gear</a>
      <a href="https://instagram.com/thesingletracks" target="_blank">Instagram</a>
      <a href="https://www.facebook.com/thesingletracks" target="_blank">Facebook</a>
      <a href="https://www.youtube.com/@thesingletracks" target="_blank">YouTube</a>
      <a href="{{ '/contatti' | relative_url }}">Contatti</a>
    </div>
    <span class="footer-copy">© 2026 The Singletracks · Trail & Ultra Running</span>
  </footer>

</body>
</html>
